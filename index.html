<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSCT Mastery Suite | Preparation Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .progress-transition { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .correct-opt { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong-opt { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .sidebar-active { background: #1e293b; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-50">
            <div class="p-8">
                <h1 class="text-2xl font-bold tracking-tighter text-blue-400">NSCT<span class="text-white">PREP</span></h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-bold">Graduate Competency Engine</p>
            </div>

            <!-- Global Progress Tracker -->
            <div class="px-8 mb-6">
                <div class="flex justify-between text-xs mb-2">
                    <span class="text-slate-400">Total Preparation Score</span>
                    <span id="global-percent" class="text-blue-400 font-bold">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="global-progress-bar" class="bg-blue-500 h-full progress-transition" style="width: 0%"></div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto px-4 space-y-1 custom-scrollbar">
                <button onclick="showDashboard()" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 transition mb-4">
                    <i class="fas fa-home mr-3"></i> Dashboard Overview
                </button>
                <div class="text-[10px] font-bold text-slate-500 uppercase px-3 mb-2">Syllabus Areas</div>
                <div id="sidebar-list">
                    <!-- Links generated by JS -->
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col overflow-auto bg-slate-50">
            <!-- Header -->
            <header class="h-16 glass border-b flex items-center justify-between px-10 sticky top-0 z-40">
                <div id="view-title" class="font-bold text-slate-700 text-lg">Dashboard Overview</div>
                <div class="flex items-center space-x-4">
                    <button onclick="resetAllProgress()" class="text-xs text-red-500 hover:underline">Reset Progress</button>
                    <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">IT</div>
                </div>
            </header>

            <!-- VIEW: DASHBOARD -->
            <section id="view-dashboard" class="p-10 animate-fade-in">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="dashboard-grid">
                    <!-- Topic Cards Generated by JS -->
                </div>
            </section>

            <!-- VIEW: QUIZ ENGINE -->
            <section id="view-quiz" class="hidden p-10">
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                        <!-- Quiz Header -->
                        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                            <div>
                                <h2 id="quiz-topic-name" class="text-xl font-bold">Topic Name</h2>
                                <p id="quiz-subtopic-name" class="text-xs text-slate-400"></p>
                            </div>
                            <div class="text-right">
                                <span id="q-count-text" class="text-sm font-mono bg-slate-800 px-3 py-1 rounded">01/20</span>
                            </div>
                        </div>

                        <!-- Progress indicator for current quiz -->
                        <div class="h-1 w-full bg-slate-200">
                            <div id="quiz-session-progress" class="h-full bg-blue-500 progress-transition" style="width: 0%"></div>
                        </div>

                        <!-- Question Body -->
                        <div class="p-10">
                            <h3 id="question-text" class="text-2xl font-semibold text-slate-800 mb-8 leading-snug"></h3>
                            
                            <div id="options-container" class="grid grid-cols-1 gap-4">
                                <!-- Options Generated by JS -->
                            </div>

                            <!-- Feedback/Explanation -->
                            <div id="explanation-box" class="hidden mt-8 p-6 rounded-2xl bg-blue-50 border border-blue-100 animate-fade-in">
                                <div class="flex items-start">
                                    <div class="bg-blue-500 text-white p-2 rounded-lg mr-4">
                                        <i class="fas fa-lightbulb"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-blue-900 mb-1">Concept Insight</h4>
                                        <p id="explanation-text" class="text-blue-800 text-sm leading-relaxed"></p>
                                    </div>
                                </div>
                            </div>

                            <!-- Controls -->
                            <div class="mt-10 pt-6 border-t flex justify-between items-center">
                                <button onclick="showDashboard()" class="text-slate-500 font-medium hover:text-slate-800">
                                    <i class="fas fa-times mr-2"></i> Exit Session
                                </button>
                                <button id="btn-next" onclick="nextQuestion()" class="hidden bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                                    Next Question <i class="fas fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SYLLABUS = [
            { id: 'logic', name: 'Problem Solving & Analytics', weight: 20, icon: 'fa-brain', file: 'problem-solving.json' },
            { id: 'web-dev', name: 'Web Development', weight: 10, icon: 'fa-code', file: 'web-dev.json' },
            { id: 'programming', name: 'Programming (C++/Java/Py)', weight: 10, icon: 'fa-terminal', file: 'programming.json' },
            { id: 'dsa', name: 'Data Structures & Algos', weight: 10, icon: 'fa-sitemap', file: 'dsa.json' },
            { id: 'networks', name: 'Networks & Cloud', weight: 10, icon: 'fa-cloud', file: 'networking.json' },
            { id: 'databases', name: 'Database Systems', weight: 10, icon: 'fa-database', file: 'databases.json' },
            { id: 'ai-ml', name: 'AI / ML & Data Analytics', weight: 10, icon: 'fa-robot', file: 'ai-ml.json' },
            { id: 'software-eng', name: 'Software Engineering', weight: 10, icon: 'fa-project-diagram', file: 'software-eng.json' },
            { id: 'os', name: 'Operating Systems', weight: 5, icon: 'fa-microchip', file: 'os.json' },
            { id: 'cyber', name: 'Cyber Security', weight: 5, icon: 'fa-shield-alt', file: 'cyber-security.json' }
        ];

        let state = {
            currentTopic: null,
            currentIndex: 0,
            progress: JSON.parse(localStorage.getItem('nsct_v2_progress')) || {}
        };

        function init() {
            renderSidebar();
            renderDashboard();
            updateGlobalProgress();
        }

        function renderSidebar() {
            const list = document.getElementById('sidebar-list');
            list.innerHTML = SYLLABUS.map(topic => {
                const p = getProgress(topic.id);
                return `
                    <button onclick="startQuiz('${topic.id}')" class="w-full flex flex-col p-3 rounded-lg hover:bg-slate-800 transition mb-1 group">
                        <div class="flex items-center w-full">
                            <i class="fas ${topic.icon} mr-3 text-slate-500 group-hover:text-blue-400"></i>
                            <span class="text-sm font-medium text-slate-300 group-hover:text-white">${topic.name}</span>
                        </div>
                        <div class="w-full bg-slate-800 h-1 mt-2 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full" style="width: ${p}%"></div>
                        </div>
                    </button>
                `;
            }).join('');
        }

        function renderDashboard() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = SYLLABUS.map(topic => {
                const p = getProgress(topic.id);
                return `
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-xl transition-all cursor-pointer group" onclick="startQuiz('${topic.id}')">
                        <div class="flex justify-between items-start mb-6">
                            <div class="p-4 bg-slate-50 rounded-2xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i class="fas ${topic.icon} text-2xl"></i>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Weightage</span>
                                <p class="text-xl font-bold text-slate-800">${topic.weight}%</p>
                            </div>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">${topic.name}</h3>
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-sm font-bold text-blue-600">${p}% Complete</span>
                            <span class="text-xs text-slate-400 font-medium">MCQs Mastered</span>
                        </div>
                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                            <div class="bg-blue-600 h-full progress-transition" style="width: ${p}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getProgress(topicId) {
            const data = state.progress[topicId];
            if (!data || !data.total) return 0;
            return Math.round((data.mastered.length / data.total) * 100);
        }

        function updateGlobalProgress() {
            let totalWeighted = 0;
            SYLLABUS.forEach(t => {
                const p = getProgress(t.id);
                totalWeighted += (p * (t.weight / 100));
            });
            const final = Math.round(totalWeighted);
            document.getElementById('global-percent').innerText = final + '%';
            document.getElementById('global-progress-bar').style.width = final + '%';
        }

        async function startQuiz(topicId) {
            const topic = SYLLABUS.find(t => t.id === topicId);
            try {
                const res = await fetch(`syllabus/${topic.file}`);
                const data = await res.json();
                
                state.currentTopic = { ...topic, ...data };
                state.currentIndex = 0;
                
                // Initialize state for this topic if first time
                if(!state.progress[topicId]) {
                    state.progress[topicId] = { mastered: [], total: data.questions.length };
                } else {
                    state.progress[topicId].total = data.questions.length;
                }
                save();

                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-quiz').classList.remove('hidden');
                document.getElementById('view-title').innerText = "Exam Practice Session";
                renderQuestion();
            } catch (err) {
                alert(`Error: Ensure syllabus/${topic.file} exists and you are running on a local server (Live Server).`);
            }
        }

        function renderQuestion() {
            const q = state.currentTopic.questions[state.currentIndex];
            document.getElementById('quiz-topic-name').innerText = state.currentTopic.name;
            document.getElementById('quiz-subtopic-name').innerText = q.subtopic;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('q-count-text').innerText = `${String(state.currentIndex + 1).padStart(2, '0')}/${state.currentTopic.questions.length}`;
            
            const progress = ((state.currentIndex + 1) / state.currentTopic.questions.length) * 100;
            document.getElementById('quiz-session-progress').style.width = progress + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = q.options.map((opt, i) => `
                <button onclick="handleAnswer(${i})" class="option-btn w-full text-left p-5 border-2 border-slate-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50 transition-all flex items-center group">
                    <span class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center mr-4 text-slate-500 font-bold group-hover:bg-blue-600 group-hover:text-white transition-colors">${String.fromCharCode(65+i)}</span>
                    <span class="text-slate-700 font-medium">${opt}</span>
                </button>
            `).join('');

            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');
        }

        function handleAnswer(idx) {
            const q = state.currentTopic.questions[state.currentIndex];
            const btns = document.querySelectorAll('.option-btn');
            
            btns.forEach(b => b.disabled = true);

            if (idx === q.answer) {
                btns[idx].classList.add('correct-opt');
                if(!state.progress[state.currentTopic.id].mastered.includes(q.id)) {
                    state.progress[state.currentTopic.id].mastered.push(q.id);
                }
            } else {
                btns[idx].classList.add('wrong-opt');
                btns[q.answer].classList.add('correct-opt');
            }

            document.getElementById('explanation-text').innerText = q.explanation;
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            save();
        }

        function nextQuestion() {
            state.currentIndex++;
            if (state.currentIndex < state.currentTopic.questions.length) {
                renderQuestion();
            } else {
                alert("Area Practice Complete!");
                showDashboard();
            }
        }

        function showDashboard() {
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-title').innerText = "Dashboard Overview";
            renderDashboard();
            renderSidebar();
            updateGlobalProgress();
        }

        function save() { localStorage.setItem('nsct_v2_progress', JSON.stringify(state.progress)); }
        function resetAllProgress() { if(confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
